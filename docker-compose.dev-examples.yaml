services:
  examplesaml001:
    build:
      context: ./dev/example-saml-001
    depends_on:
      - keycloak
    restart: always
    environment:
      KEYCLOAK_URL: "http://keycloak:8080"
    volumes:
      - "./dev/keycloak/wait-for-keycloak.sh:/tmp/wait-for-keycloak.sh"
    entrypoint: "sh -c"
    command: ["/tmp/wait-for-keycloak.sh && java -Duser.timezone=UTC -jar /app/example.jar"]
    ports:
      - "8081:8081"
    networks: [ "safed-net" ]

  exampleoidc002codeflow:
    build:
      context: ./dev/example-oidc-002
    depends_on:
      - keycloak
    restart: always
    environment:
      KEYCLOAK_URL: "http://keycloak:8080"
    volumes:
      - "./dev/keycloak/wait-for-keycloak.sh:/tmp/wait-for-keycloak.sh"
    entrypoint: "sh -c"
    command: ["/tmp/wait-for-keycloak.sh && java -Duser.timezone=UTC -jar /app/example.jar --spring.profiles.active=codeflow"]
    ports:
      - "8082:8082"
    networks: [ "safed-net" ]

  exampleoidc002hybridflow:
