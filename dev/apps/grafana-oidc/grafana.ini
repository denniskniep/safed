#################################### Server ####################################
[server]
# The full public facing URL
#root_url = https://grafana.example.com

#################################### Security ##################################
[security]
# Set to false to disable basic auth (optional - keep enabled initially)
# disable_initial_admin_creation = false

#################################### Auth ######################################
[auth]
# Set to true to disable (hide) the login form
# disable_login_form = false

#################################### Generic OAuth #############################
[auth.generic_oauth]
enabled = true
name = OIDC Provider
icon = signin
client_id = grafana-oidc
client_secret = grafana
scopes = openid profile

auth_url = http://keycloak:8080/realms/demo/protocol/openid-connect/auth
token_url = http://keycloak:8080/realms/demo/protocol/openid-connect/token
api_url = http://keycloak:8080/realms/demo/protocol/openid-connect/userinfo
allow_sign_up = true

# Attribute paths for user information
email_attribute_path = preferred_username

# Use PKCE (recommended for security)
use_pkce = false

# Optional: allowed domains
# allowed_domains = example.com

# Optional: team and organization sync
# team_ids =
# allowed_organizations =

#################################### Users #####################################
[users]
# Allow users to sign up
allow_sign_up = false
# Auto assign users to organization
auto_assign_org = true
# Auto assign organization role
auto_assign_org_role = Viewer

#################################### Basic Auth ################################
[auth.basic]
# Keep enabled initially, then optionally disable after OIDC is working
enabled = true
